<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>User Application</legend>
            <label>UserName</label>
            <input type="text"/>
        <br/>
            <label>Email:</label>
            <input type="text"/>
            <br>
            <label>Enter your gender:</label> <br>
            <label>Male</label>
            <input type="radio"/>
            <label>Female</label>
            <input type="radio"/>
            <br>

            <label>Check Skills:</label> <br>
            <label>Java</label>
            <input type="checkbox"/>
            <label>Js</label>
            <input type="checkbox"/>
            <label>Spring</label>
            <input type="checkbox"/>

             <p>select name of country: </p>
            <select>
                <option selected disabled>select</option>
                <optgroup label="Asia Countries">
                    <option value="ind">india</option>
                    <option value="Nep">Nepal</option>
                    <option value="chi">China</option>
                </optgroup>
                <optgroup label="Europe Countries">
                    <option value="Us">USA</option>
                    <option value="UK">United Kingdom</option>
                    <option value="Rus">Russia</option>
                </optgroup>
            </select>

            <br><br>
            <label >age:</label>
            <input type="text" >

            <br> <br>
            <label for="time">Select Time</label>
            <input type="time" id="time">
            <br><br>
            <label for="date">Select Date</label>
            <input type="date" id="time">
            <br><br>
            <label for="resume">Upload resume:</label>
            <input type="file" id="resume" accept=".pdf">
            <br><br>
            <label for="ph no">Enter MObile Number:</label>
            <input type="tel" id="phNO" minlength="10" maxlength="10" pattern="[0-9]{10}">
            <br><br>
            <label for="url">Enter your git URL:</label>
            <input type="url" id="url">
            <br><br>
            <label for="password">Enter your password:</label>
            <input type="" id="pass" pattern="">
            <br><br>
            <label for="feed">FeedBackDemo:</label>
            <input type="text" id="FBD">
            <br><br>
            <label for"email">Enter email:</label>
            <input type="email" id="email">
            <input type="button" value="submit">
        </fieldset>
    </form>
</body>
</html>
