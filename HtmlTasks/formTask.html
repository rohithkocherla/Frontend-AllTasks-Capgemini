<html lang="en">
<head>
    <meta charset="UTF-8">

            <br>
            <label for="">Gender:</label>
            <br>
            <label>Male</label>

            <label>Female</label>
            <input type="radio" name="gender" value="female"><br><br>

             <input type="checkbox">

            <input type="checkbox">

            Year of Experience:
            <input type="range" min="5" max="10" step="2">

        </fieldset>
    </form>
