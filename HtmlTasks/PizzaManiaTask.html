<!DOCTYPE html>

<head>

<body>
    <header style="background-color:yellow;padding:0px"><h2>

                  &#127829; Pizza Mania &#127829;

<form>
    <fieldset>
        <legend>&#127829; Pizza Order Here &#127829;</legend>
        <table>
            <tr>
                <td>First Name:</td>
                <td> <input type="text" name="firstname" placeholder="first name" required></td>
            </tr>
            <tr>
    <td>Last Name:</td>

</tr>

<tr>

</tr>

<tr>

</tr>

<tr>

</tr> 
<tr><td>Size:</td></tr>

        <input type="radio" name="Large" value="large"> <label>Large</label>

</tr>
<tr>
    <td>
        <mark>Outlet</mark>
    </td>
    <td>
        <select>
        <option>Sele</option>
        </select>
    </td>
</tr>

        </table>
    </fieldset>
</form>

</body>
</html>
