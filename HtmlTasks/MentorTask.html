<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Registration Form</title>
  <link rel="stylesheet" href="MentorTask.css">

</head>

<body>

<div class="container">
  <h2>Registration Form</h2>

  <form id="form">

    
    <input type="text" id="name" placeholder="Full Name">
    <div class="error" id="nameError"></div>

    <input type="text" id="email" placeholder="Email">
    <div class="error" id="emailError"></div>

    <input type="password" id="password" placeholder="Password">
    <div class="error" id="passwordError"></div>

    <input type="password" id="confirmPassword" placeholder="Confirm Password">
    <div class="error" id="confirmPasswordError"></div>

    <input type="text" id="age" placeholder="Age">
    <div class="error" id="ageError"></div>

    <div class="btn-group">
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </div>

  </form>
</div>

<script>
  const form = document.getElementById("form");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;
    let age = document.getElementById("age").value.trim();

    let nameError = document.getElementById("nameError");
    let emailError = document.getElementById("emailError");
    let passwordError = document.getElementById("passwordError");
    let confirmPasswordError = document.getElementById("confirmPasswordError");
    let ageError = document.getElementById("ageError");


    nameError.innerText = "";
    emailError.innerText = "";
    passwordError.innerText = "";
    confirmPasswordError.innerText = "";
    ageError.innerText = "";

    let isValid = true;

    let nameRegex = /^[A-Za-z ]+$/;
    if (name === "") {
      nameError.innerText = "Name is required";
      isValid = false;
    } else if (name.length < 3) {
      nameError.innerText = "Minimum 3 characters required";
      isValid = false;
    } else if (!nameRegex.test(name)) {
      nameError.innerText = "Only alphabets and spaces allowed";
      isValid = false;
    }

    let emailRegex = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (email === "") {
      emailError.innerText = "Email is required";
      isValid = false;
    } else if (!emailRegex.test(email)) {
      emailError.innerText = "Invalid email format";
      isValid = false;
    }

    let passwordRegex = /^(?=.*\d).{8,}$/;
    if (password === "") {
      passwordError.innerText = "Password is required";
      isValid = false;
    } else if (!passwordRegex.test(password)) {
      passwordError.innerText = "Minimum 8 characters & at least 1 number";
      isValid = false;
    }

    if (confirmPassword === "") {
      confirmPasswordError.innerText = "Confirm your password";
      isValid = false;
    } else if (password !== confirmPassword) {
      confirmPasswordError.innerText = "Passwords do not match";
      isValid = false;
    }

    if (age === "") {
      ageError.innerText = "Age is required";
      isValid = false;
    } else if (isNaN(age)) {
      ageError.innerText = "Age must be a number";
      isValid = false;
    } else if (age < 18 || age > 60) {
      ageError.innerText = "Age must be between 18 and 60";
      isValid = false;
    }

    if (isValid) {
      alert("Registration Successful!");
      form.reset();
    }
  });
</script>

</body>
</html>
