<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Application</title>
</head>
<body>

    <h2>JOB APPLICATION</h2>
    <hr>

    <form>

        <label>NAME:</label>
        <input type="text" placeholder="CAPITAL ONLY" required>
        <br><br>

        <label>CONTACT:</label>
        <input type="tel" required>
        <br><br>

    
        <label>EMAIL:</label>
        <input type="email" required>
        <br><br>

        <label>DATE OF JOINING:</label>
        <input type="date" required>
        <br><br>

        <label>Experience (In Same Company):</label>
        <input type="radio" name="exp" value="yes"> Yes
        <input type="radio" name="exp" value="no"> No
        <br><br>

        
        <label>SKILLS:</label>
        <input type="checkbox" name="skills" value="flutter"> Flutter
        <input type="checkbox" name="skills" value="react"> React Js
        <input type="checkbox" name="skills" value="angular"> Angular Js
        <input type="checkbox" name="skills" value="vue"> VUE JS
        <br><br>

        <label>JOB ID:</label>
        <input type="text" value="QSP-20-2025" readonly>
        <br><br>

        <label>PROJECT DOCUMENTATION:</label>
        <input type="file">
        <br><br>

        <label>APPLICANT PASSWORD:</label>
        <input type="password" required>
        <br><br>


        <input type="submit" value="Submit">

    </form>

</body>
</html>
