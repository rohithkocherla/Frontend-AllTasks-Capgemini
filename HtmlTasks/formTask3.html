<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
</head>
<body>

    <center>
        <p><b>Please complete all the information below.</b></p>
    </center>

    <fieldset>
        <legend><b>Sign Up Here</b></legend>

        <form>

            <table cellpadding="10">
                <tr>
                    <td><b>Name:</b></td>
                    <td>
                        <input type="text" placeholder="First Name" style="margin-right: 20px;">

                        <input type="text" placeholder="Last Name">
                    </td>
                </tr>

                <tr>
                    <br>
                    <td><b>Email:</b></td>
                    <td>
                        <input type="email" placeholder="Enter the email">
                    </td>

                    <td><b>Contact:</b></td>
                    <td>
                        <input type="tel" placeholder="Ex-1234567890">
                    </td>
                </tr>

                 <br>
                <tr>
                    <td><b>Set password:</b></td>
                    <td>
                        <input type="password" placeholder="New password">
                    </td>
                </tr>
<br>
                <tr>
                    <td><b>Profile:</b></td>
                    <td>
                        <input type="file">
                    </td>
                </tr>
<br>
                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="Submit">
                    </td>
                </tr>

            </table>
        </form>

    </fieldset>

</body>
</html>
